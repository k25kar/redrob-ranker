ai_usage_summary: |
  Used Claude as an engineering assistant throughout: architecture discussion, code review,
  implementing scoring changes, and building the internal evaluation harness (hand-labeled
  benchmark, baseline comparisons, LLM-as-judge audit of the shipped ranking's 11-160 band).
  All design decisions, trade-offs, and label verification were reviewed and owned by the team.
  The ranking step itself is plain Python — no LLM, no network, no GPU at rank time.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Embedding-free, fully deterministic rule ranker built around evidence-over-keywords: the
  dominant signal is described production retrieval/ranking/recsys work in career history,
  with duplicated role descriptions counted once and plain-language IR phrasing ("relevance",
  "user intent", "re-ranking") scored alongside buzzwords. Title fit, experience band (soft
  penalty beyond 11y), corroborated skills (discounted on stuffer inconsistency), and education
  support but never override evidence. A hard gate removes arithmetically impossible histories
  (tenure sum >> stated experience); keyword-stuffer, consulting-only, research-only and
  domain-mismatch patterns are soft, capped penalties. Availability (response rate, recency,
  open-to-work), location/notice fit, and identity verification apply as small bounded
  multipliers; near-ties are refined by JD-stated qualities (eval rigor, seniority, ownership,
  impact). Validated against a method-blind hand-labeled benchmark plus an independent
  LLM-recruiter audit of ranks 11-160; honeypot rate in top-100 is zero. Runs in ~40s on a
  laptop CPU, single command, byte-identical output across runs.

